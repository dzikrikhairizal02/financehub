<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="48" fill="url(#bg-gradient)" />
  <rect width="192" height="192" rx="48" fill="none" stroke="url(#icon-gradient)" stroke-width="4" />
  <g transform="translate(96, 96)" filter="url(#glow)">
    <path d="M0 -40 L10 -10 L40 -10 L15 10 L25 40 L0 20 L-25 40 L-15 10 L-40 -10 L-10 -10 Z" fill="none" stroke="url(#icon-gradient)" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="15" fill="url(#icon-gradient)" />
  </g>
  <text x="96" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#icon-gradient)">FH</text>
</svg>
